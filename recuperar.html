<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerZone - Recuperar Contraseña</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                
                <div class="login-container w-100">
                    <div class="login-header">
                        <span class="logo-icon">🎮</span>
                        <h1>GamerZone</h1>
                        <p>Recuperación de contraseña</p>
                    </div>

                    <div id="alertContainer"></div>

                    <form id="recoverForm" class="needs-validation" novalidate>
                        <p class="text-center mb-4 text-muted" style="font-size: 0.9rem;">
                            Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.
                        </p>
                        
                        <div class="form-group mb-4">
                            <label for="email" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="email" placeholder="tu@correo.com" required>
                            <div class="invalid-feedback">Por favor, ingresa un correo válido.</div>
                        </div>

                        <button type="submit" class="btn-primary-custom w-100 mb-3" id="recoverBtn">
                            Enviar instrucciones
                        </button>
                    </form>

                    <div class="auth-footer mt-4 text-center">
                        <a href="login.html" class="text-decoration-none">← Volver al inicio de sesión</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/utilities.js"></script>
    <script>
        // Script para simular el envío del correo de recuperación
        document.getElementById('recoverForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email');
            
            // Usamos la función isValidEmail que ya tienes en utilities.js
            if (!email.value || !isValidEmail(email.value)) {
                email.classList.add('is-invalid');
                return;
            }
            
            email.classList.remove('is-invalid');
            email.classList.add('is-valid');
            
            const btn = document.getElementById('recoverBtn');
            setButtonLoadingState(btn, true, 'Enviando...', 'Enviar instrucciones');
            
            // Simulamos el tiempo de envío
            setTimeout(() => {
                showAlert('✓ Se han enviado las instrucciones a tu correo.', 'success');
                setButtonLoadingState(btn, false, 'Enviando...', 'Enviar instrucciones');
                this.reset();
                email.classList.remove('is-valid');
            }, 1500);
        });
    </script>
</body>
</html>
