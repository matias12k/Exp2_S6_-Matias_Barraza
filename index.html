<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerZone</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🎮 GamerZone</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="background-image: none; color: var(--text-light);">☰</span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="ms-auto d-flex gap-3 align-items-center">
                    <a href="perfil.html" class="nav-link">👤 Mi Perfil</a>
                    <a href="carrito.html" class="nav-link cart-badge">
                        🛒 Carrito
                        <span class="cart-badge-number" id="cartCount">0</span>
                    </a>
                    <a href="login.html" class="btn-nav">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="hero-section">
        <div class="container-fluid">
            <h1>Catálogo de Videojuegos</h1>
            <p>Descubre los mejores títulos para tu plataforma favorita</p>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row mb-4">
            <div class="col-12">
                <div class="filters-section">
                    <div class="row">
                        <div class="col-12 col-md-6 col-lg-3">
                            <div class="filter-group">
                                <label for="categoryFilter" class="filter-label">Categoría</label>
                                <select id="categoryFilter" class="form-select">
                                    <option value="">Todas las categorías</option>
                                    <option value="accion">Acción</option>
                                    <option value="aventura">Aventura</option>
                                    <option value="rpg">RPG</option>
                                    <option value="estrategia">Estrategia</option>
                                    <option value="deporte">Deporte</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 col-md-6 col-lg-3">
                            <div class="filter-group">
                                <label for="platformFilter" class="filter-label">Plataforma</label>
                                <select id="platformFilter" class="form-select">
                                    <option value="">Todas las plataformas</option>
                                    <option value="pc">PC</option>
                                    <option value="ps5">PlayStation 5</option>
                                    <option value="xbox">Xbox Series X</option>
                                    <option value="switch">Nintendo Switch</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 col-md-6 col-lg-3">
                            <div class="filter-group">
                                <label for="priceFilter" class="filter-label">Rango de precio</label>
                                <select id="priceFilter" class="form-select">
                                    <option value="">Todos los precios</option>
                                    <option value="0-30">Hasta $30</option>
                                    <option value="30-60">$30 - $60</option>
                                    <option value="60-100">$60 - $100</option>
                                    <option value="100+">Más de $100</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 col-md-6 col-lg-3">
                            <div class="filter-group">
                                <label for="sortFilter" class="filter-label">Ordenar por</label>
                                <select id="sortFilter" class="form-select">
                                    <option value="popular">Más popular</option>
                                    <option value="price-asc">Precio: menor a mayor</option>
                                    <option value="price-desc">Precio: mayor a menor</option>
                                    <option value="recent">Más reciente</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="products-grid" id="productsGrid">
                    </div>
            </div>
        </div>
    </div>

    <footer class="footer-custom">
        <div class="container-fluid">
            <p>&copy; 2024 GamerZone. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/utilities.js"></script>
    <script src="js/catalogo.js"></script>

</body>
</html>
