<div class="container mt-5 text-light text-start">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-white">⚙️ Panel de Control - Gestión de Inventario</h2>
  </div>
  
  <div class="row g-4">
    <!-- Formulario Reactivo de Creación/Edición -->
    <div class="col-12 col-md-4">
      <div class="card bg-dark text-light p-3 border-secondary shadow">
        <h5 class="fw-bold mb-3 text-warning">Agregar nuevo título</h5>
        
        <form [formGroup]="productForm" (ngSubmit)="guardarProducto()">
          <div class="mb-3">
            <label class="form-label small text-muted">Título del videojuego</label>
            <input type="text" class="form-control bg-secondary text-light border-0" formControlName="titulo" placeholder="Ej: Resident Evil">
          </div>
          
          <div class="mb-3">
            <label class="form-label small text-muted">Categoría / Género</label>
            <input type="text" class="form-control bg-secondary text-light border-0" formControlName="categoria" placeholder="Ej: Acción / RPG">
          </div>
          
          <div class="mb-3">
            <label class="form-label small text-muted">Precio de venta (CLP)</label>
            <input type="number" class="form-control bg-secondary text-light border-0" formControlName="precio">
          </div>
          
          <!-- Se habilita sólo si todos los campos requeridos pasan la validación -->
          <button type="submit" class="btn btn-success w-100 fw-bold" [disabled]="productForm.invalid">
            Guardar en Stock
          </button>
        </form>
      </div>
    </div>
    
    <!-- Listado General del Catálogo en Tabla Moderna -->
    <div class="col-12 col-md-8">
      <div class="card bg-dark border-secondary p-3 shadow">
        <h5 class="fw-bold mb-3">Lista de Juegos Activos</h5>
        <div class="table-responsive">
          <table class="table table-dark table-striped table-hover align-middle m-0">
            <thead>
              <tr class="text-muted border-secondary">
                <th>Portada</th>
                <th>Juego</th>
                <th>Categoría</th>
                <th class="text-end">Precio</th>
              </tr>
            </thead>
            <tbody>
              <!-- Itera de forma limpia la lista usando la directiva de Angular -->
              <tr *ngFor="let juego of juegos" class="border-secondary">
                <td>
                  <img [src]="juego.imagen" class="rounded" style="width: 40px; height: 55px; object-fit: cover;">
                </td>
                <td class="fw-bold">{{ juego.titulo }}</td>
                <td><span class="badge bg-secondary text-uppercase">{{ juego.categoria }}</span></td>
                <td class="text-end text-success fw-bold">{{ juego.precio | currency:'CLP':'symbol':'1.0-0' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
