<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerZone - Iniciar Sesión</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex align-items-center min-vh-100">
    
    <!-- Contenedor con el Grid de Bootstrap exigido -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                
                <!-- Contenedor principal del login -->
                <div class="login-container w-100">
                    
                    <!-- Header con logo y título -->
                    <div class="login-header">
                        <span class="logo-icon">🎮</span>
                        <h1>GamerZone</h1>
                        <p>Bienvenido de vuelta, jugador</p>
                    </div>

                    <!-- Formulario de login -->
                    <form id="loginForm" class="needs-validation" novalidate>
                        
                        <!-- Selector de rol de usuario -->
                        <div class="form-group">
                            <label class="form-label">Tipo de cuenta</label>
                            <div class="role-selector">
                                <!-- Opción Cliente -->
                                <div class="role-option">
                                    <input type="radio" id="roleClient" name="userRole" value="cliente" required>
                                    <label for="roleClient" class="role-label">
                                        <span class="role-icon">👤</span>
                                        <span class="role-text">Cliente</span>
                                    </label>
                                </div>

                                <!-- Opción Administrador -->
                                <div class="role-option">
                                    <input type="radio" id="roleAdmin" name="userRole" value="admin" required>
                                    <label for="roleAdmin" class="role-label">
                                        <span class="role-icon">⚙️</span>
                                        <span class="role-text">Administrador</span>
                                    </label>
                                </div>
                            </div>
                            <div class="invalid-feedback d-block" id="roleError" style="display: none;">
                                Por favor, selecciona un tipo de cuenta
                            </div>
                        </div>

                        <!-- Alerta de mensajes -->
                        <div id="alertContainer"></div>

                        <!-- Campo de email -->
                        <div class="form-group">
                            <label for="email" class="form-label">Correo electrónico</label>
                            <input 
                                type="email" 
                                class="form-control" 
                                id="email" 
                                name="email"
                                placeholder="tu@correo.com"
                                required
                            >
                            <div class="invalid-feedback">
                                Por favor, ingresa un correo electrónico válido
                            </div>
                        </div>

                        <!-- Campo de contraseña -->
                        <div class="form-group">
                            <label for="password" class="form-label">Contraseña</label>
                            <input 
                                type="password" 
                                class="form-control" 
                                id="password" 
                                name="password"
                                placeholder="••••••••"
                                required
                            >
                            <div class="invalid-feedback">
                                Por favor, ingresa tu contraseña
                            </div>
                        </div>

                        <!-- Opciones adicionales (Recordar y Olvidé contraseña) -->
                        <div class="form-options">
                            <div class="form-check">
                                <input 
                                    class="form-check-input" 
                                    type="checkbox" 
                                    id="rememberMe" 
                                    name="rememberMe"
                                >
                                <label class="form-check-label" for="rememberMe">
                                    Recuérdame
                                </label>
                            </div>
                            <a href="recuperar.html" class="forgot-password">¿Olvidaste tu contraseña?</a>
                        </div>

                        <!-- Boton de login -->
                        <button type="submit" class="btn-login" id="loginBtn">
                            Iniciar sesión
                        </button>

                    </form>

                    <!-- Footer - Enlace al registro -->
                    <div class="auth-footer">
                        <p>¿No tienes cuenta?</p>
                        <a href="registro.html">Crear nueva cuenta</a>
                    </div>

                </div>
                
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (UNA SOLA VEZ) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Utilidades y lógica de página (UNA SOLA VEZ) -->
    <script src="js/utilities.js"></script>
    <script src="js/login.js"></script>

</body>
</html>
