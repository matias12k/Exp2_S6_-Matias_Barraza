<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerZone - Mi Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #161726; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">🎮 GamerZone</a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-sm btn-outline-light">Volver al Catálogo</a>
            </div>
        </div>
    </nav>

    <div class="checkout-steps-bar py-3 text-center">
        <div class="container d-flex justify-content-center align-items-center gap-4">
            <div class="step active"><span class="step-num">1</span> Carro</div>
            <div class="step-line"></div>
            <div class="step"><span class="step-num">2</span> Pago</div>
            <div class="step-line"></div>
            <div class="step"><span class="step-num">3</span> Obtén tu producto</div>
        </div>
    </div>

    <div class="container mt-5 mb-5">
        <div class="row g-4">
            
            <div class="col-12 col-lg-8">
                <h4 class="fw-bold text-white mb-4">Mi carrito</h4>
                
                <div id="cartItemsContainer"></div>
            </div> <div class="col-12 col-lg-4">
                <div class="checkout-summary-card p-4 rounded">
                    <h5 class="fw-bold text-white mb-4">Resumen</h5>
                    
                    <div class="d-flex justify-content-between mb-2 text-white-50 small">
                        <span id="summaryItemsCount">0 productos</span>
                        <span id="summarySubtotal">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4 text-white-50 small">
                        <span>Tarifa de servicio ℹ️</span>
                        <span class="text-success">Gratis</span>
                    </div>

                    <hr class="border-secondary mb-4">

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fs-5 fw-bold text-white">Total:</span>
                        <div class="text-end">
                            <span class="fs-4 fw-black text-white d-block" id="cartTotalAmount">$0.00</span>
                            <small class="text-success fw-bold d-block" style="font-size: 0.75rem;">¡Sin cobros extras!</small>
                        </div>
                    </div>

                    <button class="btn btn-eneba-yellow w-100 fw-bold py-3 mb-4" onclick="proceedToPayment()">
                        Continuar con la compra
                    </button>

                    <div class="form-check text-start mb-4">
                        <input class="form-check-input custom-check" type="checkbox" id="trustpilotCheck" checked>
                        <label class="form-check-label text-white-50 small" for="trustpilotCheck">
                            Acepto recibir una invitación por correo electrónico para reseñar el servicio en nuestra plataforma de confianza.
                        </label>
                    </div>

                    <div class="accordion accordion-flush bg-transparent" id="discountAccordion">
                        <div class="accordion-item bg-transparent border-0">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed bg-transparent text-white-50 px-0 small" type="button" data-bs-toggle="collapse" data-bs-target="#collapseDiscount">
                                    🏷️ ¿Tienes un código de descuento?
                                </button>
                            </h2>
                            <div id="collapseDiscount" class="accordion-collapse collapse" data-bs-parent="#discountAccordion">
                                <div class="accordion-body px-0 pt-2 d-flex gap-2">
                                    <input type="text" class="form-control form-control-sm bg-dark border-secondary text-white" placeholder="Introduce el código">
                                    <button class="btn btn-sm btn-danger px-3">Aplicar</button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div> </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utilities.js"></script>
    <script src="js/carrito.js"></script>
</body>
</html>
